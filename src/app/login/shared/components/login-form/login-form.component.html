<div class="w-full h-auto p-10 bg-white rounded-2xl shadow-float border border-gray-50 flex flex-col font-inter">
  <div class="mb-8 items-center text-center">
    <h2 class="text-3xl font-bold font-outfit text-gray-800 tracking-tight">Welcome Back</h2>
    <p class="text-sm text-gray-400 mt-2">Please enter your details to sign in.</p>
  </div>

  <form (ngSubmit)="login()" class="space-y-5">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-600 mb-1">Email address</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" #emailInput="ngModel" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl transition duration-200 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand hover:border-brand-light" placeholder="mail@example.com">
      <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="text-red-500 text-xs font-medium mt-1 ml-1 scale-up">
        <div *ngIf="emailInput.errors?.['required']">Email is required.</div>
        <div *ngIf="emailInput.errors?.['email']">Invalid email address.</div>
      </div>
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-gray-600 mb-1">Password</label>
      <input type="password" id="password" name="password" [(ngModel)]="password" #passwordInput="ngModel" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl transition duration-200 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand hover:border-brand-light" placeholder="••••••••">
      <div *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)" class="text-red-500 text-xs font-medium mt-1 ml-1 scale-up">
        <div *ngIf="passwordInput.errors?.['required']">Password is required.</div>
      </div>
    </div>
    <span class="text-red-500 text-sm font-medium" *ngIf="errorMessage">{{ errorMessage }}</span>
    <div class="flex items-center justify-between pt-2">
      <div class="flex items-center">
        <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 text-brand focus:ring-brand border-gray-300 rounded cursor-pointer transition">
        <label for="remember_me" class="ml-2 block text-sm text-gray-600 cursor-pointer select-none">Remember me</label>
      </div>
      <div class="text-sm">
        <a href="#" class="font-medium text-brand hover:text-brand-dark transition-colors">Forgot password?</a>
      </div>
    </div>
    <div class="pt-4">
      <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md shadow-brand/20 text-sm font-semibold text-white bg-brand hover:bg-brand-dark hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-all transform hover:-translate-y-0.5" [disabled]="!email || !password" [ngClass]="{'opacity-70 cursor-not-allowed hover:transform-none hover:shadow-sm': !email || !password}">Sign in</button>
    </div>
  </form>

  <div class="mt-8">
    <div class="relative">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-200"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-3 bg-white text-gray-400">Or continue with</span>
      </div>
    </div>

    <div class="mt-6">
      <button (click)="loginWithGoogle()" class="w-full flex items-center justify-center py-3 px-4 border-2 border-gray-100 rounded-xl shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 hover:border-gray-200 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-300">
        <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
        Google
      </button>
    </div>
  </div>
</div>
